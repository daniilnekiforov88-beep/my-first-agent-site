<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Портал Инженера Михаила</title>
    <style>
        body {
            background: #0a1833;
            color: #ffd700;
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        h1 {
            color: #ffd700;
            text-align: center;
            margin-top: 60px;
            font-size: 2.8em;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px #222;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }
        input[type="text"] {
            width: 350px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-family: 'Georgia', serif;
            margin-bottom: 18px;
            background: #162447;
            color: #ffd700;
            box-shadow: 0 2px 8px #111;
        }
        button {
            background: #ffd700;
            color: #0a1833;
            font-family: 'Georgia', serif;
            font-size: 1.1em;
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 8px #222;
            transition: background 0.2s, color 0.2s;
        }
        button:hover {
            background: #fff8dc;
            color: #0a1833;
        }
    </style>
</head>
<body>
    <h1>Портал Инженера Михаила. От Ковчега до Кода</h1>
    <form method="POST">
        <input type="text" name="message" placeholder="Введите ваше сообщение..." required>
        <button type="submit">Отправить сообщение</button>
    </form>
</body>
</html>
